<html>
<head>
    <title>TaskTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">TaskTrack</a>

        <div>
            {% if g.user %}
                <a class="btn btn-light btn-sm" href="/tasks/dashboard">Dashboard</a>
                <a class="btn btn-light btn-sm" href="/tasks/add">Add Task</a>
                <a class="btn btn-light btn-sm" href="/tasks/categories">Categories</a>
                <a class="btn btn-light btn-sm" href="/tasks/completed">Completed</a>
                <a class="btn btn-light btn-sm" href="/tasks/profile">Profile</a>
                <a class="btn btn-danger btn-sm" href="/auth/logout">Logout</a>
            {% else %}
                <a class="btn btn-light btn-sm" href="/auth/login">Login</a>
                <a class="btn btn-light btn-sm" href="/auth/register">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% for message in get_flashed_messages() %}
        <div class="alert alert-info">{{ message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
